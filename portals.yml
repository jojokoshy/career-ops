# Portal Scanner Configuration — Jojo Koshy
# Principal Cloud Solution Architect | Singapore/APAC
# Target roles: SA / Pre-Sales / Cloud Architect / Engineering Manager

location_filter:
  include:
    # At least one of these must appear in the job's location field.
    # Empty location = unknown = always passes (catches remote/unspecified roles).
    - "Singapore"
    - "APAC"
    - "Asia Pacific"
    - "Asia-Pacific"
    - "Remote"
    - "Worldwide"
    - "Global"
  exclude:
    # Jobs at these locations are always skipped.
    - "United States"
    - "New York"
    - "San Francisco"
    - "Austin"
    - "Seattle"
    - "Chicago"
    - "Boston"
    - "Denver"
    - "Los Angeles"
    - "Atlanta"
    - "Europe"
    - "EMEA"
    - "London"
    - "Germany"
    - "France"
    - "Netherlands"
    - "Spain"
    - "Poland"
    - "Sweden"

title_filter:
  positive:
    # Solutions Architect family
    - "Solutions Architect"
    - "Solution Architect"
    - "Cloud Architect"
    - "Cloud Solution Architect"
    - "Enterprise Architect"
    - "Technical Architect"
    - "Principal Architect"
    - "Staff Architect"
    # Pre-sales & Sales Engineering
    - "Pre-Sales"
    - "Presales"
    - "Sales Engineer"
    - "Sales Engineering"
    - "Solutions Engineer"
    - "Solutions Engineering"
    - "Technical Sales"
    # Customer-facing technical roles
    - "Customer Engineer"
    - "Technical Account Manager"
    - "TAM"
    - "Field CTO"
    - "Field Engineer"
    - "Customer Success Engineer"
    - "Solutions Consultant"
    - "Technical Consultant"
    # Engineering Management
    - "Engineering Manager"
    - "Director of Engineering"
    - "VP of Engineering"
    - "Head of Engineering"
    - "Head of Solutions"
    - "Head of Pre-Sales"
    # Cloud-specific
    - "Cloud Engineer"
    - "Cloud Platform"
    - "Cloud Infrastructure"
    - "Multi-Cloud"
    - "Hybrid Cloud"
    # AI/ML SA adjacents
    - "AI Solutions"
    - "AI Architect"
    - "ML Architect"
    - "GenAI Architect"
    - "AI Customer Engineer"
    - "AI Field Engineer"

  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Entry Level"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "SAP "
    - "Oracle EBS"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "PHP"
    - "Ruby"

  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"

# -- Tracked companies --
# Major cloud providers, ISVs, and AI companies hiring SA/pre-sales in APAC

tracked_companies:

  # -- Hyperscalers & Big Tech (APAC SA teams) --

  - name: Google Cloud
    careers_url: https://careers.google.com/jobs/results/?q=solutions+architect+singapore
    scan_method: websearch
    scan_query: 'site:careers.google.com "Solutions Architect" OR "Customer Engineer" OR "Technical Account Manager" Singapore OR APAC'
    enabled: true

  - name: Microsoft
    careers_url: https://jobs.careers.microsoft.com/global/en/search
